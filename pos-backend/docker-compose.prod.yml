# Production compose for single-host deployment (AWS EC2).
# Expects app.jar alongside, and a .env file with: MYSQL_ROOT_PASSWORD,
# MYSQL_PASSWORD, JWT_SECRET, CORS_ALLOWED_ORIGINS
services:
  mysql:
    image: mysql:8.0
    container_name: pos_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: pos_db
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - pos_mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=UTC
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: eclipse-temurin:21-jre-alpine
    container_name: pos_backend
    restart: unless-stopped
    working_dir: /app
    command: ["java", "-jar", "app.jar"]
    volumes:
      - ./app.jar:/app/app.jar:ro
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILE: prod
      DB_URL: jdbc:mysql://mysql:3306/pos_db
      DB_USERNAME: pos_user
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # No SMTP configured in the demo — keep the mail indicator out of /actuator/health
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"

volumes:
  pos_mysql_data:
