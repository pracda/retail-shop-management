spring:
  application:
    name: pos-backend
  profiles:
    active: ${SPRING_PROFILE:dev}
  # Mail — set MAIL_HOST (and credentials) to enable email features.
  # If MAIL_HOST is empty the JavaMailSender bean is skipped and the app runs without email.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: ${SWAGGER_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ── AI Assistant ──────────────────────────────────────────────────────────────
# All LLM calls are routed through the external Secure LLM API Gateway.
# Leave LLM_GATEWAY_URL unset to disable the feature (endpoints return 503).
# Auth (first configured wins): LLM_GATEWAY_API_KEY (sent as X-API-Key, preferred),
# or LLM_GATEWAY_TOKEN (a pre-minted JWT bearer), or LLM_GATEWAY_USERNAME +
# LLM_GATEWAY_PASSWORD to log in for a JWT automatically.
assistant:
  gateway-url: ${LLM_GATEWAY_URL:}
  gateway-api-key: ${LLM_GATEWAY_API_KEY:}
  gateway-token: ${LLM_GATEWAY_TOKEN:}
  gateway-username: ${LLM_GATEWAY_USERNAME:}
  gateway-password: ${LLM_GATEWAY_PASSWORD:}
  provider: ${LLM_PROVIDER:ANTHROPIC}
  admin-model: ${ASSISTANT_ADMIN_MODEL:claude-haiku-4-5-20251001}
  cashier-model: ${ASSISTANT_CASHIER_MODEL:claude-haiku-4-5-20251001}
  daily-query-cap-per-user: ${ASSISTANT_DAILY_CAP:50}
  request-timeout-seconds: ${ASSISTANT_TIMEOUT_SECONDS:45}

