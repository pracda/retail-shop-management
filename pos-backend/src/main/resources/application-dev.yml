spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:pos_user}
    password: ${DB_PASSWORD:pos_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      minimum-idle: 2
      pool-name: PosHikariPool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

jwt:
  secret: ${JWT_SECRET:dev-secret-key-minimum-64-characters-long-change-in-production-now}
  access-token-expiry-ms: 900000        # 15 minutes
  refresh-token-expiry-ms: 604800000    # 7 days

logging:
  level:
    com.mart: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

